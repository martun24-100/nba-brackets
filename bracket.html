<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fill Your Bracket — NBA 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, sans-serif; background: #F8F8F6; min-height: 100vh; }

    header {
      background: #253B73;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 { color: #F8F8F6; font-size: 1.2rem; font-weight: 700; }
    header .user-tag { color: #F8F8F6; font-size: 0.9rem; opacity: 0.8; }

    .nav-links a {
      color: #F8F8F6;
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }

    .deadline-bar {
      background: #B52532;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .locked-bar {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 0.95rem;
    }

    main { padding: 24px 16px; max-width: 1400px; margin: 0 auto; }

    h2.section-title {
      color: #253B73;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 24px 0 12px;
      padding-bottom: 6px;
      border-bottom: 3px solid #B52532;
      display: inline-block;
    }

    .conference-wrapper {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .conference-block {
      flex: 1;
      min-width: 300px;
    }

    .conf-title {
      color: #253B73;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .round-label {
      color: #666;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 6px;
      font-weight: 700;
    }

    .series-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(37,59,115,0.08);
      padding: 14px 16px;
      margin-bottom: 12px;
      border-left: 4px solid #253B73;
    }

    .series-card.finals { border-left-color: #B52532; }

    .series-teams {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #333;
    }

    .team-name { font-weight: 600; }
    .vs { color: #999; font-size: 0.8rem; }

    .pick-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    select {
      flex: 1;
      min-width: 140px;
      padding: 8px 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.88rem;
      background: white;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { outline: none; border-color: #253B73; }
    select:disabled { background: #f0f0f0; cursor: not-allowed; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #555;
      flex-wrap: wrap;
    }

    .score-row label { font-weight: 600; white-space: nowrap; }

    .score-select {
      padding: 6px 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
    }

    .result-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-top: 4px;
    }

    .correct { background: #d4edda; color: #155724; }
    .wrong { background: #f8d7da; color: #721c24; }
    .partial { background: #fff3cd; color: #856404; }

    .finals-wrapper {
      max-width: 560px;
      margin: 0 auto 32px;
    }

    .submit-row {
      text-align: center;
      margin: 32px 0;
    }

    button.submit-btn {
      background: #B52532;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 16px 48px;
      font-family: Arial, sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
    }

    button.submit-btn:hover { background: #9a1f2b; }
    button.submit-btn:active { transform: scale(0.98); }
    button.submit-btn:disabled { background: #aaa; cursor: not-allowed; }

    .save-status {
      color: #253B73;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .pts-badge {
      font-size: 0.8rem;
      color: #B52532;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .conference-wrapper { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏀 NBA Playoff Brackets 2026</h1>
    <div class="user-tag" id="user-tag"></div>
  </div>
  <div class="nav-links">
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="index.html">← Back</a>
  </div>
</header>

<div class="deadline-bar" id="deadline-bar">
  🕐 Bracket closes: <strong id="deadline-display"></strong>
</div>

<div class="locked-bar" id="locked-bar" style="display:none">
  🔒 Bracket is locked. Playoffs have started — you can view but not edit picks.
</div>

<main>
  <div id="bracket-root"></div>

  <div class="submit-row" id="submit-row">
    <button class="submit-btn" onclick="saveBracket()" id="save-btn">💾 SAVE MY BRACKET</button>
    <div class="save-status" id="save-status"></div>
  </div>
</main>

<script>
// ---- State ----
let USER_ID = localStorage.getItem('nba_user_id');
let USERNAME = localStorage.getItem('nba_username');
let picks = {};        // { seriesKey: { winner, score } }
let results = {};      // { seriesKey: { winner, score } }
let isLocked = false;
let seeds = JSON.parse(JSON.stringify(INITIAL_SEEDS)); // mutable copy

if (!USER_ID) window.location.href = 'index.html';

document.getElementById('user-tag').textContent = `👤 ${USERNAME}`;
document.getElementById('deadline-display').textContent = formatDeadline();

// ---- Score options ----
const SCORE_OPTIONS = ['4-0','4-1','4-2','4-3'];

// ---- Series key helpers ----
function seriesKey(conf, round, idx) {
  return `${conf}_r${round}_s${idx}`;
}

function winnerKey(conf, round, idx) {
  return `${conf}_r${round}_w${idx}`;
}

// ---- Get teams for a matchup ----
function getTeam(conf, ref) {
  // ref is either a seed index (number) or a winnerKey string
  if (typeof ref === 'number') {
    return seeds[conf][ref];
  }
  // It's a winner reference like "e_r1_w0"
  const parts = ref.split('_');
  const c = parts[0] === 'e' ? 'east' : 'west';
  const r = parseInt(parts[1].replace('r',''));
  const i = parseInt(parts[2].replace('w',''));
  const sk = seriesKey(c, r, i);
  const w = picks[sk]?.winner;
  if (!w) return null;
  return { team: w, abbr: w.substring(0,3).toUpperCase(), logo: '' };
}

// ---- Build bracket HTML ----
function buildBracket() {
  const root = document.getElementById('bracket-root');
  root.innerHTML = '';

  // Conference rounds
  const confWrapper = document.createElement('div');
  confWrapper.className = 'conference-wrapper';

  ['east','west'].forEach(conf => {
    const block = document.createElement('div');
    block.className = 'conference-block';

    const title = document.createElement('div');
    title.className = 'conf-title';
    title.textContent = conf === 'east' ? '🏀 Eastern Conference' : '🏀 Western Conference';
    block.appendChild(title);

    const roundNames = ['First Round','Second Round','Conference Finals'];
    const confMatchups = MATCHUPS[conf];

    ['r1','r2','r3'].forEach((rKey, ri) => {
      const label = document.createElement('div');
      label.className = 'round-label';
      label.textContent = roundNames[ri];
      block.appendChild(label);

      confMatchups[rKey].forEach((matchup, idx) => {
        const sk = seriesKey(conf, ri+1, idx);
        const teamA = getTeam(conf, matchup[0]);
        const teamB = getTeam(conf, matchup[1]);
        block.appendChild(buildSeriesCard(sk, teamA, teamB, conf, ri+1, idx, false));
      });
    });

    confWrapper.appendChild(block);
  });

  root.appendChild(confWrapper);

  // Finals
  const finalsTitle = document.createElement('h2');
  finalsTitle.className = 'section-title';
  finalsTitle.textContent = '🏆 NBA Finals';
  root.appendChild(finalsTitle);

  const finalsWrapper = document.createElement('div');
  finalsWrapper.className = 'finals-wrapper';

  const eastChamp = (() => {
    const sk = seriesKey('east', 3, 0);
    const w = picks[sk]?.winner;
    return w ? { team: w } : null;
  })();
  const westChamp = (() => {
    const sk = seriesKey('west', 3, 0);
    const w = picks[sk]?.winner;
    return w ? { team: w } : null;
  })();

  const finalsSk = 'finals_s0';
  finalsWrapper.appendChild(buildSeriesCard(finalsSk, eastChamp, westChamp, 'finals', 4, 0, true));
  root.appendChild(finalsWrapper);
}

function buildSeriesCard(sk, teamA, teamB, conf, round, idx, isFinals) {
  const card = document.createElement('div');
  card.className = 'series-card' + (isFinals ? ' finals' : '');
  card.id = `card-${sk}`;

  const pick = picks[sk] || {};
  const result = results[sk];

  // Teams display
  const teamsDiv = document.createElement('div');
  teamsDiv.className = 'series-teams';
  const nameA = teamA ? teamA.team : '(TBD)';
  const nameB = teamB ? teamB.team : '(TBD)';
  teamsDiv.innerHTML = `<span class="team-name">${nameA}</span><span class="vs">vs</span><span class="team-name">${nameB}</span>`;
  card.appendChild(teamsDiv);

  // Winner dropdown
  const pickRow = document.createElement('div');
  pickRow.className = 'pick-row';

  const winnerSel = document.createElement('select');
  winnerSel.id = `winner-${sk}`;
  winnerSel.disabled = isLocked;

  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '— Pick winner —';
  winnerSel.appendChild(placeholder);

  if (teamA) {
    const optA = document.createElement('option');
    optA.value = teamA.team;
    optA.textContent = teamA.team;
    winnerSel.appendChild(optA);
  }
  if (teamB) {
    const optB = document.createElement('option');
    optB.value = teamB.team;
    optB.textContent = teamB.team;
    winnerSel.appendChild(optB);
  }

  if (pick.winner) winnerSel.value = pick.winner;

  winnerSel.addEventListener('change', () => {
    const winner = winnerSel.value;
    if (!picks[sk]) picks[sk] = {};
    picks[sk].winner = winner;

    // Auto-fill loser score to 4 if winner score < 4 has been selected
    autoFillLoser(sk);

    // Propagate winner to next round
    propagateWinner(conf, round, idx, winner);
    buildBracket();
  });

  pickRow.appendChild(winnerSel);
  card.appendChild(pickRow);

  // Score row
  const scoreRow = document.createElement('div');
  scoreRow.className = 'score-row';
  scoreRow.style.marginTop = '8px';

  const scoreLabel = document.createElement('label');
  scoreLabel.textContent = 'Series score:';
  scoreRow.appendChild(scoreLabel);

  const scoreSel = document.createElement('select');
  scoreSel.id = `score-${sk}`;
  scoreSel.className = 'score-select';
  scoreSel.disabled = isLocked;

  const blankOpt = document.createElement('option');
  blankOpt.value = '';
  blankOpt.textContent = '—';
  scoreSel.appendChild(blankOpt);

  SCORE_OPTIONS.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    scoreSel.appendChild(opt);
  });

  if (pick.score) scoreSel.value = pick.score;

  scoreSel.addEventListener('change', () => {
    if (!picks[sk]) picks[sk] = {};
    picks[sk].score = scoreSel.value;
  });

  scoreRow.appendChild(scoreSel);
  card.appendChild(scoreRow);

  // Result badge if results exist
  if (result && result.winner) {
    const badge = document.createElement('div');
    const pts = calcPoints(pick, result, round, sk);
    if (pts === 3) {
      badge.className = 'result-badge correct';
      badge.textContent = `✅ +3 pts — Correct team & score!`;
    } else if (pts === 2) {
      badge.className = 'result-badge partial';
      badge.textContent = `🟡 +2 pts — Correct team`;
    } else {
      badge.className = 'result-badge wrong';
      badge.textContent = `❌ 0 pts — Wrong pick (${result.winner} won ${result.score})`;
    }
    card.appendChild(badge);
  }

  return card;
}

function calcPoints(pick, result, round, sk) {
  if (!pick?.winner || !result?.winner) return 0;
  const correctTeam = pick.winner === result.winner;
  if (!correctTeam) return 0;
  const correctScore = pick.score === result.score;
  if (correctScore) return 3;
  return 2;
}

function propagateWinner(conf, round, idx, winner) {
  if (conf === 'finals') return;

  const nextRound = round + 1;
  const nextSeriesIdx = Math.floor(idx / 2);
  const slot = idx % 2; // 0 = top team, 1 = bottom team

  const nextMatchups = conf === 'east' ? MATCHUPS.east : MATCHUPS.west;

  let nextRoundKey;
  if (nextRound === 2) nextRoundKey = 'r2';
  else if (nextRound === 3) nextRoundKey = 'r3';
  else if (nextRound === 4) return; // goes to finals, handled separately

  if (!nextMatchups[nextRoundKey]) return;
  // The matchup references are already set up as winner keys — propagation is done by getTeam() lookups
  // We just need to rebuild
}

function autoFillLoser(sk) {
  // If score selected with winner points < 4, auto-set. 
  // Actually auto-fill is handled visually — the score dropdown already enforces 4-x format
}

async function loadData() {
  isLocked = isDeadlinePassed();

  // Load seeds from DB (set by admin)
  seeds = await loadSeedsFromDB();

  // Load existing bracket
  const { data: bracket } = await db.from('brackets').select('*').eq('user_id', USER_ID).single();
  if (bracket) {
    picks = bracket.picks || {};
    if (bracket.locked) isLocked = true;
  }

  // Load results
  const { data: res } = await db.from('results').select('*');
  if (res) {
    res.forEach(r => { results[r.series_key] = r; });
  }

  if (isLocked) {
    document.getElementById('locked-bar').style.display = 'block';
    document.getElementById('deadline-bar').style.display = 'none';
    document.getElementById('submit-row').style.display = 'none';
  }

  buildBracket();
}

async function saveBracket() {
  if (isLocked) return;

  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = 'Saving...';

  const locked = isDeadlinePassed();

  const { data: existing } = await db.from('brackets').select('id').eq('user_id', USER_ID).single();

  let err;
  if (existing) {
    ({ error: err } = await db.from('brackets')
      .update({ picks, locked })
      .eq('user_id', USER_ID));
  } else {
    ({ error: err } = await db.from('brackets')
      .insert({ user_id: USER_ID, picks, locked }));
  }

  btn.disabled = false;
  if (err) {
    status.textContent = '❌ Error saving. Try again.';
  } else {
    status.textContent = '✅ Bracket saved!';
    setTimeout(() => { status.textContent = ''; }, 3000);
  }
}

loadData();
</script>
</body>
</html>
