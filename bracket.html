<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Bracket — NBA 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #F8F8F6; min-height: 100vh; }

    header {
      background: #253B73;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { color: #F8F8F6; font-size: 1.1rem; font-weight: 700; }
    .user-tag { color: rgba(248,248,246,0.75); font-size: 0.85rem; }
    .nav-links a { color: #F8F8F6; text-decoration: none; margin-left: 18px; font-size: 0.88rem; opacity: 0.85; }
    .nav-links a:hover { opacity: 1; }

    .deadline-bar { background: #B52532; color: white; text-align: center; padding: 7px; font-size: 0.88rem; font-weight: 700; }
    .locked-bar { background: #333; color: white; text-align: center; padding: 9px; font-size: 0.9rem; display: none; }

    /* ── SAVE BAR ── */
    .save-bar {
      background: white;
      border-bottom: 2px solid #eee;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .save-bar button {
      background: #B52532;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 9px 28px;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-bar button:hover { background: #9a1f2b; }
    .save-bar button:disabled { background: #aaa; cursor: not-allowed; }
    .save-status { font-size: 0.88rem; color: #253B73; }

    /* ── BRACKET LAYOUT ── */
    .bracket-scroll { overflow-x: auto; padding: 24px 16px 40px; }

    .bracket-container {
      display: flex;
      align-items: flex-start;
      gap: 0;
      min-width: 1100px;
      position: relative;
    }

    /* Each column = one round */
    .bracket-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .col-header {
      background: #253B73;
      color: white;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 0;
      margin-bottom: 0;
    }

    .col-inner {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      padding: 8px 0;
    }

    /* ── MATCHUP CARD ── */
    .matchup {
      display: flex;
      flex-direction: column;
      width: 160px;
      margin: 6px 0;
      position: relative;
    }

    .team-slot {
      background: white;
      border: 2px solid #ddd;
      border-radius: 0;
      padding: 0;
      display: flex;
      align-items: center;
      height: 38px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .team-slot:first-child { border-radius: 6px 6px 0 0; border-bottom: 1px solid #eee; }
    .team-slot:last-child  { border-radius: 0 0 6px 6px; border-top: 1px solid #eee; }

    .team-slot:hover:not(.locked) { border-color: #253B73; background: #f0f4ff; }
    .team-slot.selected { background: #253B73; border-color: #253B73; }
    .team-slot.selected .team-name-text { color: white; }
    .team-slot.selected .seed-badge { background: rgba(255,255,255,0.2); color: white; }

    .team-slot.correct-pick { background: #d4f0d4; border-color: #4caf50; }
    .team-slot.wrong-pick   { background: #fde8e8; border-color: #e57373; }
    .team-slot.correct-pick.selected { background: #2e7d32; border-color: #2e7d32; }
    .team-slot.wrong-pick.selected   { background: #c62828; border-color: #c62828; }

    .seed-badge {
      background: #253B73;
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      width: 22px;
      min-width: 22px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .team-slot.selected .seed-badge { background: rgba(255,255,255,0.15); }

    .team-name-text {
      font-size: 0.72rem;
      font-weight: 600;
      color: #222;
      padding: 0 6px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .tbd-text { color: #aaa; font-style: italic; font-weight: 400; }

    /* Score selector below matchup */
    .score-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      padding: 0 2px;
    }
    .score-row label { font-size: 0.68rem; color: #888; white-space: nowrap; }
    .score-row select {
      flex: 1;
      font-size: 0.72rem;
      padding: 3px 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      background: white;
    }
    .score-row select:disabled { background: #f5f5f5; }

    /* Result badge */
    .result-tag {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      margin-top: 3px;
      display: none;
    }
    .result-tag.show { display: block; }
    .result-tag.pts3 { background: #c8e6c9; color: #1b5e20; }
    .result-tag.pts2 { background: #fff9c4; color: #795500; }
    .result-tag.pts0 { background: #ffcdd2; color: #b71c1c; }

    /* ── CONNECTOR LINES ── */
    .connector {
      width: 20px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── FINALS CENTER ── */
    .finals-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 180px;
      flex-shrink: 0;
      padding: 0 8px;
    }

    .finals-label {
      background: #B52532;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 16px;
      border-radius: 4px;
      margin-bottom: 8px;
      text-align: center;
    }

    .finals-matchup {
      width: 180px;
    }

    .finals-matchup .team-slot {
      height: 44px;
    }

    .finals-matchup .team-name-text { font-size: 0.78rem; }
    .finals-matchup .seed-badge { width: 26px; min-width: 26px; }

    /* ── CHAMPION ── */
    .champion-box {
      margin-top: 12px;
      text-align: center;
    }
    .champion-label { font-size: 0.7rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .champion-name {
      background: linear-gradient(135deg, #c8a020, #e8c840);
      color: #1a1a00;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 6px;
      min-width: 160px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* ── CONFERENCE LABELS ── */
    .conf-section {
      display: flex;
      align-items: stretch;
    }

    .conf-label-east {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      background: #253B73;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 8px 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .conf-label-west {
      writing-mode: vertical-rl;
      background: #253B73;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 8px 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── SCORE MODAL ── */
    .score-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .score-modal.open { display: flex; }
    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 28px;
      min-width: 300px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    .modal-box h3 { color: #253B73; margin-bottom: 6px; font-size: 1rem; }
    .modal-box p { color: #666; font-size: 0.85rem; margin-bottom: 16px; }
    .modal-box select {
      width: 100%;
      padding: 10px;
      border: 2px solid #253B73;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-confirm { background: #253B73; color: white; }
    .btn-cancel  { background: #eee; color: #333; }

    /* mobile */
    @media (max-width: 800px) {
      .bracket-scroll { padding: 16px 8px 32px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏀 NBA Playoff Brackets 2026</h1>
    <div class="user-tag" id="user-tag"></div>
  </div>
  <div class="nav-links">
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="index.html">← Home</a>
  </div>
</header>

<div class="deadline-bar" id="deadline-bar">
  🕐 Bracket closes: <strong id="deadline-display"></strong>
</div>
<div class="locked-bar" id="locked-bar">
  🔒 Playoffs have started — bracket is locked. View only.
</div>

<div class="save-bar" id="save-bar">
  <button onclick="saveBracket()" id="save-btn">💾 Save My Bracket</button>
  <span class="save-status" id="save-status"></span>
</div>

<div class="bracket-scroll">
  <div class="bracket-container" id="bracket-root"></div>
</div>

<!-- Score picker modal -->
<div class="score-modal" id="score-modal">
  <div class="modal-box">
    <h3 id="modal-title">Pick series score</h3>
    <p id="modal-sub"></p>
    <select id="modal-score">
      <option value="">— Choose score —</option>
      <option value="4-0">4-0</option>
      <option value="4-1">4-1</option>
      <option value="4-2">4-2</option>
      <option value="4-3">4-3</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmPick()">Confirm</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let USER_ID   = localStorage.getItem('nba_user_id');
let USERNAME  = localStorage.getItem('nba_username');
let picks     = {};
let results   = {};
let seeds     = null;
let isLocked  = false;

// pending modal state
let pendingSK = null, pendingWinner = null, pendingSeed = null;

if (!USER_ID) window.location.href = 'index.html';
document.getElementById('user-tag').textContent = `👤 ${USERNAME}`;
document.getElementById('deadline-display').textContent = formatDeadline();

// ── SERIES DEFINITIONS ──
// Each series: key, conf, round, seedA index, seedB index (or 'winner of...')
const EAST_R1 = [
  { key:'east_r1_s0', a:0, b:7 },
  { key:'east_r1_s1', a:1, b:6 },
  { key:'east_r1_s2', a:2, b:5 },
  { key:'east_r1_s3', a:3, b:4 },
];
const EAST_R2 = [
  { key:'east_r2_s0', srcA:'east_r1_s0', srcB:'east_r1_s1' },
  { key:'east_r2_s1', srcA:'east_r1_s2', srcB:'east_r1_s3' },
];
const EAST_R3 = [
  { key:'east_r3_s0', srcA:'east_r2_s0', srcB:'east_r2_s1' },
];
const WEST_R1 = [
  { key:'west_r1_s0', a:0, b:7 },
  { key:'west_r1_s1', a:1, b:6 },
  { key:'west_r1_s2', a:2, b:5 },
  { key:'west_r1_s3', a:3, b:4 },
];
const WEST_R2 = [
  { key:'west_r2_s0', srcA:'west_r1_s0', srcB:'west_r1_s1' },
  { key:'west_r2_s1', srcA:'west_r1_s2', srcB:'west_r1_s3' },
];
const WEST_R3 = [
  { key:'west_r3_s0', srcA:'west_r2_s0', srcB:'west_r2_s1' },
];
const FINALS = { key:'finals_s0', srcA:'east_r3_s0', srcB:'west_r3_s0' };

// ── GET WINNER OF A SERIES ──
function getWinner(sk) {
  return picks[sk]?.winner || null;
}

// ── GET TEAM NAME ──
function teamName(conf, seedIdx) {
  return seeds[conf][seedIdx]?.team || 'TBD';
}

// ── BUILD THE FULL BRACKET ──
function buildBracket() {
  const root = document.getElementById('bracket-root');
  root.innerHTML = '';

  // East side: R1 → R2 → ECF
  const eastSide = buildConferenceSide('east', EAST_R1, EAST_R2, EAST_R3);

  // West side: WCF → R2 → R1 (mirrored)
  const westSide = buildConferenceSide('west', WEST_R1, WEST_R2, WEST_R3, true);

  // Finals center
  const finalsCol = buildFinalsCol();

  root.appendChild(eastSide);
  root.appendChild(finalsCol);
  root.appendChild(westSide);
}

function buildConferenceSide(conf, r1List, r2List, r3List, mirror = false) {
  const SLOT_H  = 38 * 2 + 4 + 12 + 4 + 20 + 8; // approx height per matchup slot
  const wrapper = document.createElement('div');
  wrapper.style.display = 'flex';
  wrapper.style.alignItems = 'stretch';

  const confLabel = document.createElement('div');
  confLabel.className = mirror ? 'conf-label-west' : 'conf-label-east';
  confLabel.textContent = conf === 'east' ? 'Eastern Conference' : 'Western Conference';

  // Build columns
  const r1Col = buildRoundCol(conf, r1List, 'east', 1, 'First Round', 4);
  const r2Col = buildRoundCol(conf, r2List, 'east', 2, 'Semifinals', 2);
  const r3Col = buildRoundCol(conf, r3List, 'east', 3, conf === 'east' ? 'East Finals' : 'West Finals', 1);

  const cols = mirror
    ? [r3Col, r2Col, r1Col, confLabel]
    : [confLabel, r1Col, r2Col, r3Col];

  cols.forEach(c => wrapper.appendChild(c));
  return wrapper;
}

function buildRoundCol(conf, seriesList, _unused, round, label, count) {
  const col = document.createElement('div');
  col.style.display = 'flex';
  col.style.flexDirection = 'column';
  col.style.flexShrink = '0';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'col-header';
  hdr.style.width = '160px';
  hdr.textContent = label;
  col.appendChild(hdr);

  // Inner
  const inner = document.createElement('div');
  inner.style.display = 'flex';
  inner.style.flexDirection = 'column';
  inner.style.justifyContent = 'space-around';
  inner.style.flex = '1';
  inner.style.padding = '8px 0';
  inner.style.width = '160px';

  seriesList.forEach(s => {
    const teamA = getTeamForSlot(conf, s, 'a');
    const teamB = getTeamForSlot(conf, s, 'b');
    const seedA = getSeedForSlot(conf, s, 'a');
    const seedB = getSeedForSlot(conf, s, 'b');
    inner.appendChild(buildMatchup(s.key, teamA, teamB, seedA, seedB, round));
  });

  col.appendChild(inner);

  // Connector spacer between cols
  const connWrap = document.createElement('div');
  connWrap.style.display = 'flex';
  connWrap.style.alignItems = 'center';
  connWrap.appendChild(col);

  const conn = document.createElement('div');
  conn.style.width = '18px';
  conn.style.flexShrink = '0';
  connWrap.appendChild(conn);

  return connWrap;
}

function getTeamForSlot(conf, s, slot) {
  if (s.a !== undefined && slot === 'a') return teamName(conf, s.a);
  if (s.b !== undefined && slot === 'b') return teamName(conf, s.b);
  const src = slot === 'a' ? s.srcA : s.srcB;
  return getWinner(src) || 'TBD';
}

function getSeedForSlot(conf, s, slot) {
  if (s.a !== undefined && slot === 'a') return s.a + 1;
  if (s.b !== undefined && slot === 'b') return s.b + 1;
  return null;
}

function buildMatchup(sk, teamA, teamB, seedA, seedB, round) {
  const wrap = document.createElement('div');
  wrap.className = 'matchup';
  wrap.style.margin = '8px 0';

  const pick   = picks[sk] || {};
  const result = results[sk];

  // Top team slot
  wrap.appendChild(buildTeamSlot(sk, teamA, seedA, pick, result, 'a'));
  // Bottom team slot
  wrap.appendChild(buildTeamSlot(sk, teamB, seedB, pick, result, 'b'));

  // Score row
  const scoreRow = document.createElement('div');
  scoreRow.className = 'score-row';
  const scoreLbl = document.createElement('label');
  scoreLbl.textContent = 'Score:';
  const scoreVal = document.createElement('span');
  scoreVal.style.fontSize = '0.72rem';
  scoreVal.style.fontWeight = '700';
  scoreVal.style.color = '#253B73';
  scoreVal.style.marginLeft = '4px';
  scoreVal.textContent = pick.score || '—';
  scoreVal.id = `score-display-${sk}`;
  scoreRow.appendChild(scoreLbl);
  scoreRow.appendChild(scoreVal);
  wrap.appendChild(scoreRow);

  // Result badge
  if (result?.winner) {
    const pts = calcPoints(pick, result);
    const tag = document.createElement('div');
    tag.className = 'result-tag show ' + (pts === 3 ? 'pts3' : pts === 2 ? 'pts2' : 'pts0');
    tag.textContent = pts === 3 ? `✅ +3 pts` : pts === 2 ? `🟡 +2 pts` : `❌ 0 pts`;
    wrap.appendChild(tag);
  }

  return wrap;
}

function buildTeamSlot(sk, teamName_, seed, pick, result, slot) {
  const isTBD = !teamName_ || teamName_ === 'TBD' || teamName_.startsWith('TBD');
  const isSelected = pick.winner === teamName_ && !isTBD;

  // color coding
  let extraClass = '';
  if (result?.winner) {
    if (isSelected) {
      extraClass = result.winner === teamName_ ? ' correct-pick' : ' wrong-pick';
    }
  }

  const slotEl = document.createElement('div');
  slotEl.className = 'team-slot' + (isSelected ? ' selected' : '') + extraClass + (isLocked ? ' locked' : '');

  // Seed badge
  const badge = document.createElement('div');
  badge.className = 'seed-badge';
  badge.textContent = seed || '?';
  slotEl.appendChild(badge);

  // Name
  const name = document.createElement('div');
  name.className = 'team-name-text' + (isTBD ? ' tbd-text' : '');
  name.textContent = teamName_ || 'TBD';
  slotEl.appendChild(name);

  if (!isLocked && !isTBD) {
    slotEl.style.cursor = 'pointer';
    slotEl.addEventListener('click', () => openModal(sk, teamName_, seed));
  }

  return slotEl;
}

function buildFinalsCol() {
  const col = document.createElement('div');
  col.className = 'finals-col';

  const lbl = document.createElement('div');
  lbl.className = 'finals-label';
  lbl.textContent = '🏆 NBA Finals';
  col.appendChild(lbl);

  const s = FINALS;
  const teamA = getWinner(s.srcA) || 'East Champion';
  const teamB = getWinner(s.srcB) || 'West Champion';
  const pick   = picks[s.key] || {};
  const result = results[s.key];

  const mWrap = document.createElement('div');
  mWrap.className = 'finals-matchup';
  mWrap.appendChild(buildTeamSlot(s.key, teamA, 'E', pick, result, 'a'));
  mWrap.appendChild(buildTeamSlot(s.key, teamB, 'W', pick, result, 'b'));

  const scoreRow = document.createElement('div');
  scoreRow.className = 'score-row';
  scoreRow.style.marginTop = '5px';
  const sl = document.createElement('label'); sl.textContent = 'Score:';
  const sv = document.createElement('span');
  sv.style.cssText = 'font-size:0.72rem;font-weight:700;color:#253B73;margin-left:4px;';
  sv.id = `score-display-${s.key}`;
  sv.textContent = pick.score || '—';
  scoreRow.appendChild(sl); scoreRow.appendChild(sv);
  mWrap.appendChild(scoreRow);

  if (result?.winner) {
    const pts = calcPoints(pick, result);
    const tag = document.createElement('div');
    tag.className = 'result-tag show ' + (pts === 3 ? 'pts3' : pts === 2 ? 'pts2' : 'pts0');
    tag.textContent = pts === 3 ? `✅ +3 pts` : pts === 2 ? `🟡 +2 pts` : `❌ 0 pts`;
    mWrap.appendChild(tag);
  }

  col.appendChild(mWrap);

  // Champion
  const champ = document.createElement('div');
  champ.className = 'champion-box';
  const cl = document.createElement('div'); cl.className = 'champion-label'; cl.textContent = '🏆 Champion';
  const cn = document.createElement('div'); cn.className = 'champion-name';
  cn.textContent = getWinner(s.key) || '?';
  champ.appendChild(cl); champ.appendChild(cn);
  col.appendChild(champ);

  return col;
}

// ── MODAL ──
function openModal(sk, winner, seed) {
  if (isLocked) return;
  pendingSK     = sk;
  pendingWinner = winner;
  pendingSeed   = seed;

  document.getElementById('modal-title').textContent = `Pick winner`;
  document.getElementById('modal-sub').textContent   = `You selected: ${winner}. Choose the series score:`;
  document.getElementById('modal-score').value       = picks[sk]?.score || '';
  document.getElementById('score-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('score-modal').classList.remove('open');
  pendingSK = pendingWinner = pendingSeed = null;
}

function confirmPick() {
  if (!pendingSK) return;
  const score = document.getElementById('modal-score').value;

  if (!picks[pendingSK]) picks[pendingSK] = {};
  picks[pendingSK].winner = pendingWinner;
  picks[pendingSK].score  = score;

  closeModal();
  buildBracket();
}

// ── POINTS CALC ──
function calcPoints(pick, result) {
  if (!pick?.winner || !result?.winner) return 0;
  if (pick.winner !== result.winner) return 0;
  return pick.score === result.score ? 3 : 2;
}

// ── SAVE ──
async function saveBracket() {
  if (isLocked) return;
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = 'Saving...';

  const locked = isDeadlinePassed();
  const { data: existing } = await db.from('brackets').select('id').eq('user_id', USER_ID).single();
  let err;
  if (existing) {
    ({ error: err } = await db.from('brackets').update({ picks, locked }).eq('user_id', USER_ID));
  } else {
    ({ error: err } = await db.from('brackets').insert({ user_id: USER_ID, picks, locked }));
  }

  btn.disabled = false;
  if (err) {
    status.textContent = '❌ Error. Try again.';
  } else {
    status.textContent = '✅ Saved!';
    setTimeout(() => { status.textContent = ''; }, 3000);
  }
}

// ── LOAD ──
async function loadData() {
  isLocked = isDeadlinePassed();

  seeds = await loadSeedsFromDB();

  const [{ data: bracket }, { data: res }] = await Promise.all([
    db.from('brackets').select('*').eq('user_id', USER_ID).single(),
    db.from('results').select('*'),
  ]);

  if (bracket) {
    picks = bracket.picks || {};
    if (bracket.locked) isLocked = true;
  }

  if (res) res.forEach(r => { results[r.series_key] = r; });

  if (isLocked) {
    document.getElementById('locked-bar').style.display = 'block';
    document.getElementById('deadline-bar').style.display = 'none';
    document.getElementById('save-bar').style.display = 'none';
  }

  buildBracket();
}

loadData();
</script>
