<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Bracket — NBA 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #F8F8F6; min-height: 100vh; }

    header {
      background: #253B73;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { color: #F8F8F6; font-size: 1.1rem; font-weight: 700; }
    .user-tag { color: rgba(248,248,246,0.75); font-size: 0.85rem; }
    .nav-links a { color: #F8F8F6; text-decoration: none; margin-left: 18px; font-size: 0.88rem; opacity: 0.85; }
    .nav-links a:hover { opacity: 1; }

    .deadline-bar { background: #B52532; color: white; text-align: center; padding: 7px; font-size: 0.88rem; font-weight: 700; }
    .locked-bar { background: #333; color: white; text-align: center; padding: 9px; font-size: 0.9rem; display: none; }

    .save-bar {
      background: white;
      border-bottom: 2px solid #eee;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .save-bar button {
      background: #B52532; color: white; border: none; border-radius: 6px;
      padding: 9px 28px; font-family: Arial, sans-serif; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .save-bar button:hover { background: #9a1f2b; }
    .save-bar button:disabled { background: #aaa; cursor: not-allowed; }
    .save-status { font-size: 0.88rem; color: #253B73; }

    /* ── BRACKET SCROLL AREA ── */
    .bracket-scroll { overflow-x: auto; padding: 20px 12px 40px; }

    .bracket-container {
      display: flex;
      align-items: center;
      min-width: 1200px;
      gap: 0;
    }

    /* ── CONFERENCE WRAPPER ── */
    .conf-side {
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
    }

    .conf-label {
      writing-mode: vertical-rl;
      background: #253B73;
      color: white;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 8px 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .conf-label.east { transform: rotate(180deg); }

    /* ── ROUND COLUMN ── */
    .round-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      width: 158px;
    }

    .round-header {
      background: #253B73;
      color: white;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 5px 4px;
      white-space: nowrap;
      overflow: hidden;
    }

    .round-inner {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      padding: 6px 0;
      gap: 0;
    }

    /* ── CONNECTOR ── */
    .connector { width: 16px; flex-shrink: 0; }

    /* ── MATCHUP ── */
    .matchup {
      width: 158px;
      margin: 6px 0;
      flex-shrink: 0;
    }

    .team-slot {
      background: white;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      height: 36px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .team-slot:first-of-type { border-radius: 5px 5px 0 0; border-bottom: 1px solid #eee; }
    .team-slot:last-of-type  { border-radius: 0 0 5px 5px; border-top: 1px solid #eee; }

    .team-slot:hover:not(.no-click) { border-color: #253B73; background: #eef2ff; }
    .team-slot.selected { background: #253B73; border-color: #253B73; }
    .team-slot.selected .team-txt { color: white; }
    .team-slot.selected .seed-num { background: rgba(255,255,255,0.18); color: white; }

    .team-slot.correct-result { background: #e8f5e9; border-color: #66bb6a; }
    .team-slot.wrong-result   { background: #ffebee; border-color: #ef9a9a; }
    .team-slot.selected.correct-result { background: #2e7d32; border-color: #2e7d32; }
    .team-slot.selected.wrong-result   { background: #c62828; border-color: #c62828; }
    .team-slot.no-click { cursor: default; }

    .seed-num {
      background: #253B73;
      color: white;
      font-size: 0.62rem;
      font-weight: 700;
      width: 20px;
      min-width: 20px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .team-txt {
      font-size: 0.7rem;
      font-weight: 600;
      color: #1a1a1a;
      padding: 0 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .team-txt.tbd { color: #bbb; font-style: italic; font-weight: 400; }

    .score-line {
      font-size: 0.65rem;
      color: #888;
      padding: 2px 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .score-val { font-weight: 700; color: #253B73; }

    .pts-tag {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-top: 1px;
      display: none;
    }
    .pts-tag.show { display: inline-block; }
    .pts-tag.p3 { background: #c8e6c9; color: #1b5e20; }
    .pts-tag.p2 { background: #fff9c4; color: #795500; }
    .pts-tag.p0 { background: #ffcdd2; color: #b71c1c; }

    /* ── FINALS CENTER ── */
    .finals-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 190px;
      padding: 0 6px;
      gap: 10px;
    }

    .finals-banner {
      background: #B52532;
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 5px 14px;
      border-radius: 4px;
      text-align: center;
    }

    .finals-matchup { width: 190px; }
    .finals-matchup .team-slot { height: 42px; }
    .finals-matchup .team-txt { font-size: 0.75rem; }
    .finals-matchup .seed-num { width: 24px; min-width: 24px; font-size: 0.65rem; }

    .champ-box { text-align: center; }
    .champ-label { font-size: 0.65rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .champ-name {
      background: linear-gradient(135deg, #c8a020, #f0d060);
      color: #1a1200;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 6px;
      min-width: 170px;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 28px 24px;
      width: 320px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    .modal-box h3 { color: #253B73; font-size: 1rem; margin-bottom: 4px; }
    .modal-box p  { color: #666; font-size: 0.84rem; margin-bottom: 14px; }
    .modal-box select {
      width: 100%; padding: 10px; border: 2px solid #253B73;
      border-radius: 6px; font-family: Arial, sans-serif; font-size: 0.95rem; margin-bottom: 16px;
    }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .btn-ok  { background: #253B73; color: white; }
    .btn-cancel { background: #eee; color: #333; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏀 NBA Playoff Brackets 2026</h1>
    <div class="user-tag" id="user-tag"></div>
  </div>
  <div class="nav-links">
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="index.html">← Home</a>
  </div>
</header>

<div class="deadline-bar" id="deadline-bar">
  🕐 Bracket closes: <strong id="deadline-display"></strong>
</div>
<div class="locked-bar" id="locked-bar">
  🔒 Playoffs have started — bracket is locked. View only.
</div>

<div class="save-bar" id="save-bar">
  <button onclick="saveBracket()" id="save-btn">💾 Save My Bracket</button>
  <span class="save-status" id="save-status"></span>
</div>

<div class="bracket-scroll">
  <div class="bracket-container" id="bracket-root"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modal-title">Pick winner</h3>
    <p id="modal-sub"></p>
    <select id="modal-score">
      <option value="">— Choose series score —</option>
      <option value="4-0">4-0</option>
      <option value="4-1">4-1</option>
      <option value="4-2">4-2</option>
      <option value="4-3">4-3</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="confirmPick()">Confirm Pick</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let USER_ID  = localStorage.getItem('nba_user_id');
let USERNAME = localStorage.getItem('nba_username');
let picks    = {};
let results  = {};
let seeds    = null;
let isLocked = false;
let pendingSK = null, pendingWinner = null;

if (!USER_ID) window.location.href = 'index.html';
document.getElementById('user-tag').textContent = `👤 ${USERNAME}`;
document.getElementById('deadline-display').textContent = formatDeadline();

/*
  CORRECT NBA BRACKET STRUCTURE
  ================================
  R1:  1v8, 4v5, 3v6, 2v7      (top half: 1v8 and 4v5 — bottom half: 3v6 and 2v7)
  R2:  W(1v8) vs W(4v5),  W(3v6) vs W(2v7)
  R3:  W(top semi) vs W(bottom semi)   ← 1 and 2 seeds can only meet here

  Keys used:
    east_r1_s0 = 1v8     east_r1_s1 = 4v5     east_r1_s2 = 3v6     east_r1_s3 = 2v7
    east_r2_s0 = W(s0) v W(s1)    east_r2_s1 = W(s2) v W(s3)
    east_r3_s0 = W(r2s0) v W(r2s1)
  Same pattern for west.
  finals_s0 = east champ v west champ
*/

const SERIES = {
  east: {
    r1: [
      { key:'east_r1_s0', seedA:0, seedB:7 },   // 1 vs 8
      { key:'east_r1_s1', seedA:3, seedB:4 },   // 4 vs 5
      { key:'east_r1_s2', seedA:2, seedB:5 },   // 3 vs 6
      { key:'east_r1_s3', seedA:1, seedB:6 },   // 2 vs 7
    ],
    r2: [
      { key:'east_r2_s0', srcA:'east_r1_s0', srcB:'east_r1_s1' }, // W(1v8) vs W(4v5)
      { key:'east_r2_s1', srcA:'east_r1_s2', srcB:'east_r1_s3' }, // W(3v6) vs W(2v7)
    ],
    r3: [
      { key:'east_r3_s0', srcA:'east_r2_s0', srcB:'east_r2_s1' },
    ],
  },
  west: {
    r1: [
      { key:'west_r1_s0', seedA:0, seedB:7 },   // 1 vs 8
      { key:'west_r1_s1', seedA:3, seedB:4 },   // 4 vs 5
      { key:'west_r1_s2', seedA:2, seedB:5 },   // 3 vs 6
      { key:'west_r1_s3', seedA:1, seedB:6 },   // 2 vs 7
    ],
    r2: [
      { key:'west_r2_s0', srcA:'west_r1_s0', srcB:'west_r1_s1' },
      { key:'west_r2_s1', srcA:'west_r1_s2', srcB:'west_r1_s3' },
    ],
    r3: [
      { key:'west_r3_s0', srcA:'west_r2_s0', srcB:'west_r2_s1' },
    ],
  },
  finals: { key:'finals_s0', srcA:'east_r3_s0', srcB:'west_r3_s0' },
};

// ── HELPERS ──
function getWinner(sk) { return picks[sk]?.winner || null; }

function seedTeam(conf, idx) {
  return seeds?.[conf]?.[idx]?.team || 'TBD';
}

function teamA(conf, s) {
  return s.seedA !== undefined ? seedTeam(conf, s.seedA) : (getWinner(s.srcA) || 'TBD');
}
function teamB(conf, s) {
  return s.seedB !== undefined ? seedTeam(conf, s.seedB) : (getWinner(s.srcB) || 'TBD');
}
function seedA(s) { return s.seedA !== undefined ? s.seedA + 1 : null; }
function seedB(s) { return s.seedB !== undefined ? s.seedB + 1 : null; }

function calcPoints(pick, result) {
  if (!pick?.winner || !result?.winner) return 0;
  if (pick.winner !== result.winner) return 0;
  return pick.score === result.score ? 3 : 2;
}

// ── BUILD BRACKET ──
function buildBracket() {
  const root = document.getElementById('bracket-root');
  root.innerHTML = '';

  // East side (left): R1 → R2 → R3
  root.appendChild(buildSide('east', false));

  // Finals center
  root.appendChild(buildFinalsCenter());

  // West side (right): R3 → R2 → R1 (mirrored)
  root.appendChild(buildSide('west', true));
}

function buildSide(conf, mirror) {
  const wrapper = document.createElement('div');
  wrapper.className = 'conf-side';

  const label = document.createElement('div');
  label.className = 'conf-label ' + (conf === 'east' ? 'east' : 'west');
  label.textContent = conf === 'east' ? 'Eastern Conference' : 'Western Conference';

  const r1 = buildRoundCol(conf, SERIES[conf].r1, 'First Round');
  const r2 = buildRoundCol(conf, SERIES[conf].r2, 'Semifinals');
  const r3 = buildRoundCol(conf, SERIES[conf].r3, conf === 'east' ? 'East Finals' : 'West Finals');

  const c1 = makeConnector();
  const c2 = makeConnector();
  const c3 = makeConnector();

  if (mirror) {
    // West: label on right, rounds go R3 → R2 → R1 left to right
    wrapper.appendChild(c3); wrapper.appendChild(r3);
    wrapper.appendChild(c2); wrapper.appendChild(r2);
    wrapper.appendChild(c1); wrapper.appendChild(r1);
    wrapper.appendChild(label);
  } else {
    // East: label on left, rounds go R1 → R2 → R3
    wrapper.appendChild(label);
    wrapper.appendChild(r1); wrapper.appendChild(c1);
    wrapper.appendChild(r2); wrapper.appendChild(c2);
    wrapper.appendChild(r3); wrapper.appendChild(c3);
  }

  return wrapper;
}

function makeConnector() {
  const d = document.createElement('div');
  d.className = 'connector';
  return d;
}

function buildRoundCol(conf, seriesList, label) {
  const col = document.createElement('div');
  col.className = 'round-col';

  const hdr = document.createElement('div');
  hdr.className = 'round-header';
  hdr.textContent = label;
  col.appendChild(hdr);

  const inner = document.createElement('div');
  inner.className = 'round-inner';

  seriesList.forEach(s => {
    inner.appendChild(buildMatchup(conf, s));
  });

  col.appendChild(inner);
  return col;
}

function buildMatchup(conf, s) {
  const wrap = document.createElement('div');
  wrap.className = 'matchup';

  const ta = teamA(conf, s);
  const tb = teamB(conf, s);
  const sa = seedA(s);
  const sb = seedB(s);
  const pick   = picks[s.key] || {};
  const result = results[s.key];

  wrap.appendChild(makeSlot(s.key, ta, sa, pick, result));
  wrap.appendChild(makeSlot(s.key, tb, sb, pick, result));

  // Score line
  const sl = document.createElement('div');
  sl.className = 'score-line';
  sl.innerHTML = `Score: <span class="score-val" id="sv-${s.key}">${pick.score || '—'}</span>`;
  wrap.appendChild(sl);

  // Points badge
  if (result?.winner) {
    const pts = calcPoints(pick, result);
    const tag = document.createElement('div');
    tag.className = 'pts-tag show ' + (pts === 3 ? 'p3' : pts === 2 ? 'p2' : 'p0');
    tag.textContent = pts === 3 ? '✅ +3 pts' : pts === 2 ? '🟡 +2 pts' : '❌ 0 pts';
    wrap.appendChild(tag);
  }

  return wrap;
}

function makeSlot(sk, name, seed, pick, result) {
  const isTBD     = !name || name === 'TBD' || name.startsWith('TBD');
  const isSelected = !isTBD && pick.winner === name;

  let resultClass = '';
  if (result?.winner && isSelected) {
    resultClass = result.winner === name ? ' correct-result' : ' wrong-result';
  }

  const slot = document.createElement('div');
  slot.className = 'team-slot' + (isSelected ? ' selected' : '') + resultClass + (isTBD || isLocked ? ' no-click' : '');

  const badge = document.createElement('div');
  badge.className = 'seed-num';
  badge.textContent = seed || '?';

  const txt = document.createElement('div');
  txt.className = 'team-txt' + (isTBD ? ' tbd' : '');
  txt.textContent = name || 'TBD';

  slot.appendChild(badge);
  slot.appendChild(txt);

  if (!isTBD && !isLocked) {
    slot.addEventListener('click', () => openModal(sk, name));
  }

  return slot;
}

function buildFinalsCenter() {
  const col = document.createElement('div');
  col.className = 'finals-center';

  const banner = document.createElement('div');
  banner.className = 'finals-banner';
  banner.textContent = '🏆 NBA Finals';
  col.appendChild(banner);

  const s    = SERIES.finals;
  const ta   = getWinner(s.srcA) || 'East Champion';
  const tb   = getWinner(s.srcB) || 'West Champion';
  const pick = picks[s.key] || {};
  const result = results[s.key];

  const mWrap = document.createElement('div');
  mWrap.className = 'finals-matchup';
  mWrap.appendChild(makeSlot(s.key, ta, 'E', pick, result));
  mWrap.appendChild(makeSlot(s.key, tb, 'W', pick, result));

  const sl = document.createElement('div');
  sl.className = 'score-line';
  sl.style.justifyContent = 'center';
  sl.innerHTML = `Score: <span class="score-val" id="sv-${s.key}">${pick.score || '—'}</span>`;
  mWrap.appendChild(sl);

  if (result?.winner) {
    const pts = calcPoints(pick, result);
    const tag = document.createElement('div');
    tag.className = 'pts-tag show ' + (pts === 3 ? 'p3' : pts === 2 ? 'p2' : 'p0');
    tag.textContent = pts === 3 ? '✅ +3 pts' : pts === 2 ? '🟡 +2 pts' : '❌ 0 pts';
    mWrap.appendChild(tag);
  }

  col.appendChild(mWrap);

  // Champion
  const champ = document.createElement('div');
  champ.className = 'champ-box';
  const cl = document.createElement('div'); cl.className = 'champ-label'; cl.textContent = '🏆 Champion';
  const cn = document.createElement('div'); cn.className = 'champ-name';
  cn.textContent = getWinner(s.key) || '?';
  champ.appendChild(cl); champ.appendChild(cn);
  col.appendChild(champ);

  return col;
}

// ── MODAL ──
function openModal(sk, winner) {
  if (isLocked) return;
  pendingSK     = sk;
  pendingWinner = winner;
  document.getElementById('modal-title').textContent = `Selected: ${winner}`;
  document.getElementById('modal-sub').textContent   = 'Choose the series score:';
  document.getElementById('modal-score').value       = picks[sk]?.score || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  pendingSK = pendingWinner = null;
}

function confirmPick() {
  if (!pendingSK) return;
  const score = document.getElementById('modal-score').value;
  if (!picks[pendingSK]) picks[pendingSK] = {};
  picks[pendingSK].winner = pendingWinner;
  picks[pendingSK].score  = score;
  closeModal();
  buildBracket();
}

// ── SAVE ──
async function saveBracket() {
  if (isLocked) return;
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = 'Saving...';

  const locked = isDeadlinePassed();
  const { data: existing } = await db.from('brackets').select('id').eq('user_id', USER_ID).single();
  let err;
  if (existing) {
    ({ error: err } = await db.from('brackets').update({ picks, locked }).eq('user_id', USER_ID));
  } else {
    ({ error: err } = await db.from('brackets').insert({ user_id: USER_ID, picks, locked }));
  }

  btn.disabled = false;
  status.textContent = err ? '❌ Error saving. Try again.' : '✅ Saved!';
  if (!err) setTimeout(() => { status.textContent = ''; }, 3000);
}

// ── LOAD ──
async function loadData() {
  isLocked = isDeadlinePassed();
  seeds = await loadSeedsFromDB();

  const [{ data: bracket }, { data: res }] = await Promise.all([
    db.from('brackets').select('*').eq('user_id', USER_ID).single(),
    db.from('results').select('*'),
  ]);

  if (bracket) {
    picks = bracket.picks || {};
    if (bracket.locked) isLocked = true;
  }
  if (res) res.forEach(r => { results[r.series_key] = r; });

  if (isLocked) {
    document.getElementById('locked-bar').style.display = 'block';
    document.getElementById('deadline-bar').style.display = 'none';
    document.getElementById('save-bar').style.display = 'none';
  }

  buildBracket();
}

loadData();
</script>
</body>
</html>
